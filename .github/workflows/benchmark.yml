name: "Benchmark"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      # Required to checkout the code
      contents: read
      # Required to put a comment into the pull-request
      pull-requests: write

    steps:
      - uses: actions/checkout@v5
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: "Install Node"
        uses: actions/setup-node@v6
        with:
          node-version: "20.x"
          cache: "pnpm"
      - name: "Install Deps"
        run: pnpm install
      - name: "Benchmark"
        run: pnpm test:benchmark --outputJson benchmark.json --watch false
      - name: "Ensure all benchmarks are < 10x baseline"
        run: node scripts/benchmarkEvaluator.js
